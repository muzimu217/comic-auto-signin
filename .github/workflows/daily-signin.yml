name: Comics Daily Sign-in

on:
  schedule:
    # 每天 UTC 时间 0:30 执行 (对应北京时间 8:30)
    - cron: '30 0 * * *'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      debug:
        description: '开启调试模式'
        required: false
        default: 'false'

jobs:
  signin:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Comics Sign-in
      env:
        ACCOUNTS_CONFIG: ${{ secrets.ACCOUNTS_CONFIG }}
      run: python main.py
      
    - name: Upload logs (if failed)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: error-logs
        path: |
          *.log
        retention-days: 7
